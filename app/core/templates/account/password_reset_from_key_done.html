{% extends "base.html" %}

{% block title %}Пароль изменён | NotifyHub{% endblock %}

{% block content %}

<section class="auth-page-card mx-auto w-full max-w-md rounded-2xl border border-zinc-200/90 bg-white p-6 shadow-xl ring-1 ring-black/[0.04] dark:border-white/10 dark:bg-zinc-900 dark:shadow-soft-dark dark:ring-white/10 sm:p-10">
    <div class="text-center text-sm font-semibold tracking-tight text-zinc-900 dark:text-white">NotifyHub</div>
    <h1 class="mt-5 text-center text-2xl font-semibold tracking-tight text-zinc-900 dark:text-white sm:text-[1.65rem]">Готово</h1>
    <p class="mt-3 text-center text-sm leading-relaxed text-zinc-600 dark:text-zinc-400">
        Новый пароль сохранён. Можно входить с новыми данными.
    </p>
    <a class="btn btn-primary mx-auto mt-8 flex h-12 w-full max-w-xs items-center justify-center text-base font-semibold" href="{% url 'account_login' %}">Войти в аккаунт</a>
</section>

{% endblock %}
