services:
  db:
    image: postgres:17-alpine
    container_name: notifyhub-db
    environment:
      POSTGRES_DB: ${POSTGRES_NAME:-notifyhub}
      POSTGRES_USER: ${POSTGRES_USER:-notifyhub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-notifyhub}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-notifyhub} -d ${POSTGRES_NAME:-notifyhub}"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:8-alpine
    container_name: notifyhub-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  web:
    build:
      context: .
    container_name: notifyhub-web
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      POSTGRES_NAME: ${POSTGRES_NAME:-notifyhub}
      POSTGRES_USER: ${POSTGRES_USER:-notifyhub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-notifyhub}
      POSTGRES_HOST: db
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"

  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: notifyhub-celery-worker
    command: celery -A app.config worker -l info
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      POSTGRES_NAME: ${POSTGRES_NAME:-notifyhub}
      POSTGRES_USER: ${POSTGRES_USER:-notifyhub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-notifyhub}
      POSTGRES_HOST: db
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: notifyhub-celery-beat
    command: celery -A app.config beat -l info
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      POSTGRES_NAME: ${POSTGRES_NAME:-notifyhub}
      POSTGRES_USER: ${POSTGRES_USER:-notifyhub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-notifyhub}
      POSTGRES_HOST: db
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
